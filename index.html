<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Love</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
      position: relative;
      z-index: 1;
    }

    /* Fullscreen background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
    }

    .hero {
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 50px;
      z-index: 1;
    }

    .hero h1 {
      font-size: 3em;
    }

    .hero p {
      max-width: 500px;
    }

    .buttons {
      margin-top: 20px;
    }

    .buttons button {
      margin-right: 10px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #e50914;
      border: none;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .buttons button:hover {
      background-color: #b00610;
    }

    .carousel {
      padding: 20px;
      background-color: rgba(0, 0, 0, 0.8); /* semi-transparent for readability */
    }

    .carousel h2 {
      margin-bottom: 10px;
    }

    .carousel-items {
      display: flex;
      overflow-x: scroll;
      scroll-behavior: smooth;
    }

    .carousel-items::-webkit-scrollbar {
      display: none;
    }

    .carousel-items img {
      height: 150px;
      margin-right: 10px;
      border-radius: 5px;
      transition: transform 0.3s;
    }

    .carousel-items img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- Background video -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="8.mp4" type="video/mp4">
  </video>

  <!-- Content -->
  <div class="hero">
    <h1>Shaina Pangilinan Icmat</h1>
    <p>By your #1 Fan<br>
      Thank you so much for everything my love for the efforts and etc. And I'm sorry for annoying you every time.
    </p>
    <div class="buttons">
      <button onclick="alert('Play button clicked!')">▶ Play</button>
       <a href="https://troymrnd.github.io/Netflix/" style="display: inline-block; padding: 10px 20px; background-color: #FF0000; color: white; text-decoration: none; border: 1px solid #ccc; border-radius: 5px;">← Back</a>

    </div>
  </div>

  <div class="carousel">
    <h2>Top Picks For You</h2>
    <div class="carousel-items" id="carousel">
      <img src="1.jfif" alt="Love">
      <img src="2.jfif" alt="Love">
      <img src="3.jfif" alt="Love">
      <img src="5.jfif" alt="Love">
      <img src="6.jfif" alt="Love">
      <img src="7.jfif" alt="Love">
      <img src="11.jfif" alt="Love">
      <img src="9.jfif" alt="Love">
      <img src="12.jfif" alt="Love">
      <img src="13.jfif" alt="Love">
      <img src="12.jfif" alt="Love">
      <img src="13.jfif" alt="Love">
      <img src="13.jfif" alt="Love">
	  <img src="11.jfif" alt="Love">
    </div>
  </div>

  <script>
    const carousel = document.getElementById('carousel');
    let scrollInterval;

    carousel.addEventListener('mouseenter', () => {
      scrollInterval = setInterval(() => {
        carousel.scrollLeft += 1;
        if (carousel.scrollLeft + carousel.clientWidth >= carousel.scrollWidth) {
          carousel.scrollLeft = 0;
        }
      }, 10);
    });

    carousel.addEventListener('mouseleave', () => {
      clearInterval(scrollInterval);
    });
  </script>

</body>
</html>
